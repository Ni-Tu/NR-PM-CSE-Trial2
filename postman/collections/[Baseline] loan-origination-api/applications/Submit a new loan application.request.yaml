type: http
name: Submit a new loan application
url: '{{baseUrl}}/applications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "applicantId": "app_9876543210",
      "productType": "personal_loan",
      "requestedAmount": 25000,
      "termMonths": 36,
      "purpose": "debt_consolidation",
      "annualIncome": 85000,
      "employmentStatus": "full_time"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 1995.4512917696254,
            "termMonths": 1787,
            "status": "submitted",
            "createdAt": "2003-07-05T12:06:24.918Z",
            "updatedAt": "1997-11-26T14:37:41.573Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "in_progress",
              "decision": "denied",
              "riskScore": 68,
              "evaluatedAt": "1946-08-03T06:42:51.101Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid application data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Duplicate active application exists
