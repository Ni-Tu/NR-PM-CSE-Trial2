type: http
name: List loan applications
url: '{{baseUrl}}/applications?status=approved&productType=personal_loan&limit=25&offset=0'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: approved
    description: Filter by application status
  - key: productType
    value: personal_loan
    description: Filter by loan product type
  - key: limit
    value: '25'
  - key: offset
    value: '0'
