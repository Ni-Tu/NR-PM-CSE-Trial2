name: Postman API onboarding

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Run Postman onboarding (bootstrap + repo sync)
        uses: postman-cs/postman-api-onboarding-action@v0
        with:
          project-name: loan-origination-api
          domain: lending
          domain-code: LN
          spec-url: https://raw.githubusercontent.com/postman-cs/cse-exercise/main/specs/loan-origination-api-openapi.yaml
          environments-json: '["prod"]'
          env-runtime-urls-json: '{"prod":"https://api.example.com"}'
          postman-api-key: ${{ secrets.POSTMANAPIKEYSECRET }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GH_PAT }}
